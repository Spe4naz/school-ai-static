<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Сброс пароля — Умная Школа</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="login-wrapper">
    <div class="login-card">
      <h1>🔐 Сброс пароля</h1>
      
      <!-- Шаг 1: Запрос -->
      <div id="requestStep">
        <p style="margin-bottom: 20px; color: #666;">Введите email аккаунта, и мы отправим инструкцию по восстановлению.</p>
        <form id="resetRequestForm">
          <input type="email" id="resetEmail" class="input" placeholder="Email" required>
          <button type="submit" class="btn">Отправить инструкцию</button>
        </form>
        <p id="resetMsg" style="margin-top: 15px; font-size: 0.9rem;"></p>
        <p style="margin-top: 20px; font-size: 0.9rem;">
          Вспомнили пароль? <a href="/">Войти</a>
        </p>
      </div>

      <!-- Шаг 2: Новый пароль -->
      <div id="confirmStep" style="display: none;">
        <p style="margin-bottom: 20px; color: #666;">Придумайте новый пароль для аккаунта.</p>
        <form id="resetConfirmForm">
          <input type="password" id="newPassword" class="input" placeholder="Новый пароль (мин. 6 символов)" minlength="6" required>
          <input type="password" id="confirmPassword" class="input" placeholder="Повторите пароль" required>
          <button type="submit" class="btn">Сменить пароль</button>
        </form>
        <p id="confirmMsg" style="margin-top: 15px; font-size: 0.9rem;"></p>
      </div>
    </div>
  </div>

  <script>
    const API = '/api';
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');
    const email = params.get('email');

    // Если есть токен — показываем форму смены пароля
    if (token && email) {
      document.getElementById('requestStep').style.display = 'none';
      document.getElementById('confirmStep').style.display = 'block';
    }

    // Запрос на сброс
    document.getElementById('resetRequestForm')?.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('resetEmail').value;
      const msg = document.getElementById('resetMsg');
      
      try {
        const res = await fetch(`${API}/password-reset/request`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });
        const data = await res.json();
        msg.textContent = data.message || data.error;
        msg.style.color = res.ok ? '#10b981' : '#ef4444';
      } catch {
        msg.textContent = 'Ошибка сети';
        msg.style.color = '#ef4444';
      }
    });

    // Подтверждение сброса
    document.getElementById('resetConfirmForm')?.addEventListener('submit', async (e) => {
      e.preventDefault();
      const newPassword = document.getElementById('newPassword').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const msg = document.getElementById('confirmMsg');

      if (newPassword !== confirmPassword) {
        msg.textContent = 'Пароли не совпадают';
        msg.style.color = '#ef4444';
        return;
      }

      try {
        const res = await fetch(`${API}/password-reset/confirm`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, email, newPassword })
        });
        const data = await res.json();
        msg.textContent = data.message || data.error;
        msg.style.color = res.ok ? '#10b981' : '#ef4444';
        
        if (res.ok) {
          setTimeout(() => { window.location.href = '/'; }, 2000);
        }
      } catch {
        msg.textContent = 'Ошибка сети';
        msg.style.color = '#ef4444';
      }
    });
  </script>
</body>
</html>
